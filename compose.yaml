services:
  # The Downloader (Uses your existing Dockerfile)
  instapaper-downloader:
    build: .
    volumes:
      - ./library:/library
    environment:
      - INSTAPAPER_KEY=YOUR_INSTAPAPER_KEY
      - INSTAPAPER_SECRET=YOUR_SECRET_INSTAPAPER_KEY
      - INSTAPAPER_EMAIL=you@email.com
      - INSTAPAPER_PASSWORD=yourpassword

# The OPDS Server (Using an existing pyopds-based image)
  instapaper-opds:
    image: ghcr.io/vladbalun/opds-server:latest 
    container_name: instapaper-opds
    ports:
      - "8086:8080"
    volumes:
      - ./library:/opds-server/data:ro
    # Note: Ensure the environment variable name matches the image's documentation
    environment:
      - SCAN_INTERVAL=30
    restart: unless-stopped
