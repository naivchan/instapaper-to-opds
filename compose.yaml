services:
  # The Downloader (Builds from your Dockerfile)
  instapaper-downloader:
    build: .
    image: instapaper-downloader:latest
    container_name: instapaper-downloader
    volumes:
      - ./library:/library
    env_file:
      - .env # This pulls your KEY, SECRET, EMAIL, and PASS automatically

  # The OPDS Server (Using c4software's pyopds-server image)
  instapaper-opds:
    image: c4software/pyopds-server:latest
    container_name: instapaper-opds
    ports:
      - "8086:8080"
    volumes:
      - ./library:/books:ro
    environment:
      - LIBRARY_DIR=/books
    restart: unless-stopped
