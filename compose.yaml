services:
  # The Downloader (Uses your existing Dockerfile)
  instapaper-downloader:
    build: .
    volumes:
      - ./library:/library
    environment:
      - INSTAPAPER_KEY=YOUR_INSTAPAPER_KEY
      - INSTAPAPER_SECRET=YOUR_SECRET_INSTAPAPER_KEY
      - INSTAPAPER_EMAIL=you@email.com
      - INSTAPAPER_PASSWORD=yourpassword

# The OPDS Server (Using c4software's pyopds-server image)
  instapaper-opds:
    image: c4software/pyopds-server:latest
    container_name: instapaper-opds
    ports:
      - "8086:8080"
    volumes:
      - ./library:/books:ro
    environment:
      # Tell the server where the EPUBs are inside the container
      - LIBRARY_DIR=/books
    restart: unless-stopped
